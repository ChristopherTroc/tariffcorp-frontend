  design:
    - Load and apply the nextjs-react-expert skill before writing this artifact
    - Load and apply the tailwindcss skill before writing this artifact

  tasks:
    - Load and apply the nextjs-react-expert skill before writing this artifact
    - Load and apply the tailwindcss skill before writing this artifact
